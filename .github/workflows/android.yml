name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Code Super Safely
        run: |
          unzip promptforge-ai.zip -d target_folder
          if [ -d "target_folder/app" ]; then
            cp -r target_folder/* .
          else
            cp -r target_folder/*/* . 2>/dev/null || true
            cp -r target_folder/* . 2>/dev/null || true
          fi

      # Is step me hum missing .env.example file ko manually create kar rahe hain
      - name: Inject API Key & Missing Environment Files
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "GEMINI_API_KEY=MY_GEMINI_API_KEY" > .env.example

      - name: Force Clean Gradle Setup
        run: |
          gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew

      - name: Build Android APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/debug/*.apk
            
