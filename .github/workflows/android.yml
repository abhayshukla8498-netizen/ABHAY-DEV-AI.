name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip Source Code
        run: |
          unzip promptforge-ai.zip -d extracted_project
          mv extracted_project/*/* . || true
          mv extracted_project/* . || true

      - name: Inject API Key
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      # Yeh step aapki missing gradle wrapper files (gradlew) ko sahi version ke sath generate kar dega
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 9.3.1

      - name: Grant Execute Permission
        run: chmod +x gradlew

      # Ab yeh aapke project ke sahi wrapper se build karega, jisse libs error nahi aayega
      - name: Build APK with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: |
            **/build/outputs/apk/debug/*.apk
            
            
