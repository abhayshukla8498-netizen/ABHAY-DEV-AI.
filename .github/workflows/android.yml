name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip Source Code
        run: |
          unzip promptforge-ai.zip -d extracted_project
          mv extracted_project/*/* . || true
          mv extracted_project/* . || true

      - name: Inject API Key
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      # Agar gradle-wrapper.jar missing hai, to yeh step naya generator chalu karega
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Bina wrapper jar ke direct command se build karega
      - name: Build APK with Gradle
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: |
            **/build/outputs/apk/debug/*.apk
            
