name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ZIP file ko extract karke check karne ke liye ki files kahan hain
      - name: Extract Code Super Safely
        run: |
          unzip promptforge-ai.zip -d target_folder
          
          # Agar zip ke andar folder structure badla hai, to use root par lekar aao
          if [ -d "target_folder/app" ]; then
            cp -r target_folder/* .
          else
            cp -r target_folder/*/* . 2>/dev/null || true
            cp -r target_folder/* . 2>/dev/null || true
          fi

      - name: Inject API Key & Local Config
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      # Purane saare local gradle file ke errors ko bypass karne ke liye naya wrapper refresh
      - name: Force Clean Gradle Setup
        run: |
          gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew

      - name: Build Android APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/debug/*.apk
            
